{% extends "layout.html" %} {% block content %}
<!-- This is a simple way to access elements in a for loop
     in Jinja2Templates -->
{% for post in posts%}
<!-- This is a way Jinja2 access the templates using the 
     "dot" method its classic but handy as it dynamically renders
     data  -->
<h2>{{ post.title }}</h2>
<p>{{ post.content }}</p>
<p>{{ post.author }}</p>
{% endfor %} {% endblock content %}

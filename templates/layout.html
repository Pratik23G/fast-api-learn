<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Conditional statement sin Jinja2 based if certain values exist
     like if else  -->
    <title>
      {% if title %} FastAPI Blog - {{ title }} {% else %} FastAPI Blog {% endif
      %}
    </title>
  </head>
  <body>
    {% block content %} {% endblock content %}
  </body>
</html>
